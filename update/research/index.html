<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測定システム一覧｜橋本研究室</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --navy: #132C57;
            --orange: #E78B3A;
            --blue: #7CC4DF;
            --beige: #F7F2E9;
        }

        body {
            background: var(--beige);
            font-family: "Noto Sans JP", sans-serif;
        }
    </style>
</head>

<body>

    <!-- ▼▼ ページ全体を縦に伸ばす ▼▼ -->
    <div class="min-h-screen flex flex-col">

        <!-- ====================== -->
        <!--     ヘッダー           -->
        <!-- ====================== -->
        <div id="site-header"></div>

        <main class="flex-1 pt-28">

            <!-- ========================= -->
            <!-- 研究手法一覧 -->
            <!-- ========================= -->
            <section id="research" class="max-w-5xl mx-auto px-6 pt-12 pb-20">

                <!-- 見出し -->
                <h1 class="text-3xl text-[var(--navy)] font-bold mb-6">測定システム一覧</h1>


                <!-- サーバー起動について -->
                <div class="bg-white border-l-4 border-[var(--orange)] rounded-xl shadow-sm p-5 mb-8">

                    <div class="md:flex items-center gap-6">

                        <!-- 画像 -->
                        <div class="md:w-1/3 flex justify-center mb-4 md:mb-0">
                            <img src="../../img/render.png" alt="サーバー起動画面" class="rounded-lg border shadow max-w-full">
                        </div>

                        <!-- 説明 -->
                        <div class="md:w-2/3">
                            <h2 class="text-lg font-bold text-[var(--navy)] mb-2">
                                初回アクセス時について
                            </h2>

                            <p class="text-gray-700 leading-7">
                                計算を行うページでは、サーバーの起動準備のため、
                                初回アクセス時に左図のような画面が表示される場合があります。
                            </p>

                            <p class="mt-3 text-[var(--orange)] font-semibold">
                                数十秒ほどお待ちいただくと、自動的にページが表示されます。
                            </p>
                        </div>

                    </div>
                </div>

                <!-- ★★ 年ごとのタブ（JSで自動生成される） ★★ -->
                <div id="researchyear-tabs" class="flex gap-3 mb-8"></div>

                <!-- ★★ イベント一覧（renderNews がここへ挿入する） ★★ -->
                <div id="research-container"></div>

            </section>
        </main>
    </div>



    <!-- ====================== -->
    <!--       フッター          -->
    <!-- ====================== -->
    <footer class="text-center text-gray-700 py-6 bg-white border-t">
        © 2025 Hashimoto Laboratory
    </footer>

    </div>


    <script src="../researchList.js"></script>
    <script src="../../js/research.js"></script>
    <script src="../../js/layout.js"></script>
</body>

</html>
