    <style>
        /* 上：背景を右へ動かす */
        @keyframes scroll-right {
            0% {
                background-position-x: 0;
            }

            100% {
                background-position-x: 1000px;
            }
        }

        /* 下：背景を左へ動かす */
        @keyframes scroll-left {
            0% {
                background-position-x: 0;
            }

            100% {
                background-position-x: -1000px;
            }
        }

        /* Tailwindでは custom class を挟んで適用する */
        .bg-scroll-right {
            animation: scroll-right 20s linear infinite;
        }

        .bg-scroll-left {
            animation: scroll-left 20s linear infinite;
        }
    </style>

                        橋本 永手

                        東京理科大学 創域理工学部 <br>
                        社会基盤工学科 講師

                    <a href="https://www.tus.ac.jp/academics/faculty/sciencetechnology/civil_engineering/" class="inline-block mt-8 px-10 py-4 bg-[var(--orange)] text-white text-lg rounded-lg shadow-lg

                    <!-- 詳細リンク（任意）-->
